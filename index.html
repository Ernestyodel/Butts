<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUTTS 🍑</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #000, #1a001f);
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  text-align: center;
  position: relative;
}

/* BUTT */
.butt {
  width: 230px;
  cursor: pointer;
  animation: float 2.5s ease-in-out infinite;
  transition: transform 0.1s;
}

/* floating idle */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* smooth jiggle */
.jiggle {
  animation: jiggle 0.6s ease;
}

@keyframes jiggle {
  0% { transform: scale(1,1); }
  25% { transform: scale(1.2,0.8); }
  50% { transform: scale(0.9,1.2); }
  75% { transform: scale(1.1,0.9); }
  100% { transform: scale(1,1); }
}

/* counter */
.counter {
  margin-top: 15px;
  font-size: 24px;
  color: hotpink;
}

/* text */
.text {
  margin-top: 8px;
  opacity: 0.7;
}

/* button */
button {
  margin-top: 15px;
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: hotpink;
  color: white;
  font-size: 14px;
}

/* reactions */
.pop {
  position: absolute;
  font-size: 24px;
  animation: popUp 1s forwards;
}

@keyframes popUp {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  50% { opacity: 1; transform: translateY(-40px) scale(1.3); }
  100% { opacity: 0; transform: translateY(-80px) scale(1); }
}

/* particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: pink;
  border-radius: 50%;
  animation: explode 0.8s linear forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container" id="container">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Peach_emoji.png"
     class="butt"
     id="butt">

<div class="counter" id="counter">0 taps</div>
<div class="text">tap it 😏</div>

<button onclick="shareScore()">Share 🔥</button>

</div>

<!-- sound -->
<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const butt = document.getElementById("butt");
const counter = document.getElementById("counter");
const container = document.getElementById("container");
const sound = document.getElementById("sound");

let count = 0;

const reactions = ["😳","😂","🔥","🍑","😏","💀","🤣","AYOO","WILD"];

butt.addEventListener("click", () => {
  count++;
  counter.innerText = count + " taps";

  // jiggle
  butt.classList.add("jiggle");
  setTimeout(() => butt.classList.remove("jiggle"), 600);

  // sound
  sound.currentTime = 0;
  sound.play();

  // vibration
  if (navigator.vibrate) navigator.vibrate(40);

  // floating emoji
  const pop = document.createElement("div");
  pop.className = "pop";
  pop.innerText = reactions[Math.floor(Math.random()*reactions.length)];
  pop.style.left = Math.random()*200 + "px";
  pop.style.top = "0px";
  container.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);

  // particles
  for (let i = 0; i < 10; i++) {
    let p = document.createElement("div");
    p.className = "particle";

    let x = (Math.random() - 0.5) * 200 + "px";
    let y = (Math.random() - 0.5) * 200 + "px";

    p.style.setProperty("--x", x);
    p.style.setProperty("--y", y);

    container.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
});

// share
function shareScore() {
  const text = `I tapped ${count} times 🍑🔥 Beat me!`;

  if (navigator.share) {
    navigator.share({
      title: "BUTTS 🍑",
      text: text,
      url: window.location.href
    });
  } else {
    alert(text);
  }
}
</script>

</body>
</html>
